[theme]
font = "sans-serif"
baseFontSize = 16
baseRadius = "0.9rem"
buttonRadius = "full"
showWidgetBorder = true
showSidebarBorder = true
linkUnderline = false

[theme.light]
primaryColor = "#14B8A6"
backgroundColor = "#F7F8FB"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#0F172A"
linkColor = "#0F766E"
codeBackgroundColor = "#EEF2F7"
borderColor = "#D7DEE8"
dataframeBorderColor = "#D7DEE8"
dataframeHeaderBackgroundColor = "#F2F5F9"
redColor = "#EF4444"
grayColor = "#94A3B8"

[theme.dark]
primaryColor = "#2DD4BF"
backgroundColor = "#020617"
secondaryBackgroundColor = "#0F172A"
textColor = "#F8FAFC"
linkColor = "#5EEAD4"
codeBackgroundColor = "#111827"
borderColor = "#243244"
dataframeBorderColor = "#243244"
dataframeHeaderBackgroundColor = "#0F172A"
redColor = "#F87171"
grayColor = "#64748B"

[theme.light.sidebar]
primaryColor = "#14B8A6"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F2F5F9"
textColor = "#0F172A"
borderColor = "#D7DEE8"

[theme.dark.sidebar]
primaryColor = "#2DD4BF"
backgroundColor = "#020617"
secondaryBackgroundColor = "#0F172A"
textColor = "#F8FAFC"
borderColor = "#243244"
